name: Build ZIP package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  zip-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ZIP archive
        shell: bash
        run: |
          ref_name="${GITHUB_REF_NAME//\//-}"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            zip_name="AstroMaestroPro-${ref_name}.zip"
          else
            short_sha="${GITHUB_SHA::7}"
            zip_name="AstroMaestroPro-main-${short_sha}.zip"
          fi

          echo "ZIP_NAME=${zip_name}" >> "${GITHUB_ENV}"
          git archive --format=zip --output "${zip_name}" --prefix "AstroMaestroPro/" HEAD

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: astro-maestro-pro-zip
          path: ${{ env.ZIP_NAME }}
          if-no-files-found: error

      - name: Publish ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Astro Maestro Pro ZIP package"

          gh release upload "${GITHUB_REF_NAME}" "${ZIP_NAME}" --clobber
